<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grandmaster Dashboard - Ultimate Learning Engine</title>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Chessboard.js -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <!-- Chess.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        /* --- PREMIUM WOODEN TABLE THEME --- */
        body, html { 
            margin: 0; padding: 0; width: 100%; overflow: hidden;
            height: 100dvh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b1700;
            background-image: radial-gradient(circle at center, #4a2a14 0%, #120a05 100%);
            color: #e0e0e0;
            touch-action: manipulation; 
        }
        
        /* --- SCENARIO DISPLAY WITH WRAPPING --- */
        #fen-display {
            position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); left: 20px;
            font-size: 12px; color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
            pointer-events: none; z-index: 10; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            max-width: 250px; line-height: 1.4; word-wrap: break-word;
        }

        /* --- TOP RIGHT FLOATING MENU --- */
        #top-nav {
            position: absolute; top: max(15px, env(safe-area-inset-top)); right: 15px;
            display: flex; gap: 6px; z-index: 100;
        }

        .glass-btn {
            background: rgba(20, 20, 20, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.1); color: #ddd; 
            padding: 8px 14px; font-size: 11px; font-weight: bold;
            border-radius: 4px; cursor: pointer; transition: all 0.15s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6); text-transform: uppercase; letter-spacing: 1px;
        }
        .glass-btn:hover:not(:disabled) { background: rgba(0, 122, 204, 0.9); border-color: #007acc; color: white; transform: translateY(-1px); }
        .glass-btn:disabled { background: rgba(10, 10, 10, 0.6); color: #555; cursor: not-allowed; }

        #undo-btn {
            display: none; 
            position: absolute; left: calc(100% + 15px); top: 50%; transform: translateY(-50%);
            white-space: nowrap; border-color: rgba(212, 175, 55, 0.4); color: #d4af37;
        }
        #undo-btn:hover { background: rgba(212, 175, 55, 0.2); border-color: #d4af37; color: #fff; }

        /* --- DASHBOARD DROPDOWN --- */
        #dashboard-panel {
            position: absolute; top: calc(max(15px, env(safe-area-inset-top)) + 40px); right: 15px; 
            width: 320px; max-width: calc(100vw - 30px);
            background: linear-gradient(145deg, #3d2210, #170d06); 
            border: 4px solid #5c3a21; border-radius: 8px;
            padding: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.9), inset 0 0 15px rgba(0,0,0,0.8);
            display: none; z-index: 99; flex-direction: column; max-height: calc(100dvh - 90px);
            overflow-y: auto;
        }
        #dashboard-panel h2 { 
            margin: 0 0 15px 0; font-size: 18px; color: #b89947; 
            border-bottom: 1px solid #5c3a21; padding-bottom: 8px; text-align: center;
            font-family: 'Georgia', 'Times New Roman', serif; text-shadow: 1px 1px 2px #000;
        }
        
        .control-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #e6cdac; margin-bottom: 5px; text-shadow: 1px 1px 2px #000;}
        select { background-color: rgba(0,0,0,0.5); color: #e6cdac; border: 1px solid #5c3a21; padding: 10px; border-radius: 4px; font-size: 13px; outline: none; cursor: pointer; margin-bottom: 8px;}
        select:focus { border-color: #d4af37; box-shadow: 0 0 5px rgba(212,175,55,0.4); }
        
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; cursor: pointer; }
        .checkbox-wrapper input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #d4af37; }
        .checkbox-wrapper label { margin: 0; font-size: 11px; cursor: pointer; color: #e6cdac; }

        #load-btn { 
            background: linear-gradient(145deg, #4a2a14, #241407); border: 1px solid #d4af37; 
            color: #d4af37; width: 100%; padding: 10px; font-size: 12px; margin-bottom: 10px;
            font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; border-radius: 4px;
        }
        #load-btn:hover:not(:disabled) { background: #d4af37; color: #170d06; }
        
        #switch-btn { 
            background-color: rgba(0,0,0,0.4); color: #aaa; width: 100%; margin-bottom: 15px; 
            padding: 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; 
            border-radius: 4px; border: 1px solid #5c3a21; cursor: pointer; transition: 0.2s;
        }
        #switch-btn:hover { background-color: rgba(0,0,0,0.7); color: #fff; }
        
        #status-box { 
            background-color: rgba(0,0,0,0.6); padding: 12px; border-radius: 4px; 
            border-left: 3px solid #d4af37; font-weight: bold; font-size: 12px; 
            margin-bottom: 15px; text-align: center; color: #e6cdac;
        }
        #history-container { flex: 1; display: flex; flex-direction: column; min-height: 100px; overflow: hidden;}
        
        /* Upgraded Notation Box for Multi-Line Instructions */
        #move-history { 
            flex: 1; background-color: rgba(0,0,0,0.6); border: 1px solid #5c3a21; 
            border-radius: 4px; padding: 10px; overflow-y: auto; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; line-height: 1.4; color: #ddd; 
        }
        .history-turn { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .reasoning-text { color: #888; font-size: 11px; display: block; margin-top: 2px; font-style: italic; }

        /* --- MAIN STAGE --- */
        #arena {
            display: flex; justify-content: center; align-items: stretch;
            height: 100dvh; width: 100vw; gap: 30px; padding: 15px; box-sizing: border-box;
        }

        .side-panel { display: flex; flex-direction: column; align-items: center; width: 180px; transition: opacity 0.3s;}
        .opponent-panel { justify-content: flex-start; padding-top: max(15px, env(safe-area-inset-top)); }
        .player-panel { justify-content: flex-end; padding-bottom: max(15px, env(safe-area-inset-bottom)); }

        .player-info { display: flex; flex-direction: column; align-items: center; width: 100%; position: relative;}

        .player-label {
            font-size: 13px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; color: #aaa;
            background: rgba(0,0,0,0.6); padding: 4px 15px; border-radius: 4px; margin-bottom: 6px;
            white-space: nowrap; text-align: center;
        }

        .clock {
            width: 150px; height: 65px; 
            background: linear-gradient(145deg, #3d2210, #170d06);
            border: 4px solid #5c3a21; border-radius: 4px; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9), 0 6px 12px rgba(0,0,0,0.7);
            transition: transform 0.1s; position: relative; z-index: 5;
        }
        .clock .time { font-family: 'Georgia', 'Times New Roman', serif; font-size: 34px; font-weight: bold; color: #b89947; text-shadow: 1px 2px 2px #000; letter-spacing: 1px; }
        .clock-active { border-color: #d4af37; background: linear-gradient(145deg, #4a2a14, #241407); box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.3); transform: scale(1.02); }
        .clock-active .time { color: #ffe599; text-shadow: 1px 2px 4px #000, 0 0 8px rgba(212, 175, 55, 0.4); }

        .ready-to-start { cursor: pointer; animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0% { box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.1); border-color: #5c3a21;} 50% { box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 25px rgba(212, 175, 55, 0.6); border-color: #d4af37;} 100% { box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.1); border-color: #5c3a21;} }
        .ready-to-start .time { font-size: 26px; color: #ffe599; }

        .captured-area { display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; width: 100%; min-height: 80px; margin: 15px 0; }
        .captured-piece { width: 42px; height: 42px; margin: -8px; transition: transform 0.2s; }
        .captured-piece.white-piece { filter: brightness(0.75) drop-shadow(3px 4px 4px rgba(0,0,0,0.8)); }
        .captured-piece.black-piece { filter: brightness(1.1) drop-shadow(3px 4px 4px rgba(0,0,0,0.9)); }

        /* --- THE CHESSBOARD & CENTER STAGE --- */
        #center-stage { display:flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: auto; max-width: 100%; }

        #board-wrapper {
            height: calc(100dvh - 16px); width: auto; aspect-ratio: 1 / 1; 
            max-width: calc(100vw - 420px); border: 10px solid #29160a; border-radius: 2px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 10px rgba(0,0,0,0.7);
            background-color: transparent; box-sizing: border-box; 
            flex-shrink: 0; align-self: center; position: relative; z-index: 10;
        }
        #board { width: 100%; height: 100%; }

        .white-1e1d7 { background: radial-gradient(circle at center, #e6cdac 0%, #c29d6d 100%) !important; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
        .black-3c85d { background: radial-gradient(circle at center, #8a5733 0%, #522d14 100%) !important; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }
        .square-55d63 { cursor: pointer; } 
        
        .selected-square { background-color: rgba(212, 175, 55, 0.6) !important; }
        .last-move-square { background-color: rgba(255, 60, 60, 0.15) !important; box-shadow: inset 0 -6px 0 rgba(220, 30, 30, 0.85) !important; }
        .in-check-square { background: radial-gradient(circle at center, #ff3333 0%, #990000 100%) !important; box-shadow: inset 0 0 15px rgba(0,0,0,0.6); }
        .legal-move-hint::after { content: ''; position: absolute; top: 50%; left: 50%; width: 28%; height: 28%; background-color: rgba(0, 0, 0, 0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }

        /* --- THE HEURISTIC TRANSLATOR BOX --- */
        #ai-reasoning-box {
            background: linear-gradient(145deg, #1f1105, #120a05);
            border: 2px solid #5c3a21; border-radius: 6px;
            padding: 12px; color: #e6cdac; font-size: 13px; line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 5;
            transition: all 0.3s ease; display: none; box-sizing: border-box;
        }
        #ai-reasoning-box h3 { margin: 0 0 6px 0; color: #d4af37; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        body.hide-reasoning #ai-reasoning-box { display: none !important; }

        /* Desktop AI Box Routing (Absolute to left/right of center stage) */
        @media (min-width: 901px) {
            body.ai-black #ai-reasoning-box {
                display: block; position: fixed; left: 25px; top: 50%; transform: translateY(-50%); width: 240px;
            }
            body.ai-white #ai-reasoning-box {
                display: block; position: fixed; right: 25px; top: 50%; transform: translateY(-50%); width: 240px;
            }
        }

        /* --- THEORY EXPLORER NAVIGATION --- */
        #opening-nav {
            display: none; width: 100%; flex-direction: column; align-items: center; gap: 12px;
            background: linear-gradient(145deg, #1a0f05, #2b1700); border: 2px solid #5c3a21;
            padding: 20px 15px; border-radius: 8px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9), inset 0 0 10px rgba(0,0,0,0.8);
        }
        #opening-nav h3 { margin: 0; color: #d4af37; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 1px 1px 2px #000; text-align: center; }
        #opening-step { color: #e6cdac; font-family: monospace; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 4px; border: 1px solid #5c3a21; width: 60px; text-align: center;}
        
        .nav-btn-row { display: flex; width: 100%; gap: 10px; justify-content: center; }
        .nav-btn { flex: 1; padding: 12px; font-size: 14px !important;}
        
        body.is-learning .player-info, body.is-learning .captured-area { display: none !important; }
        body.is-learning .player-panel #opening-nav { display: flex; }

        /* =========================================================
           MOBILE RESPONSIVENESS LOGIC (Flexbox Magic)
           ========================================================= */
        @media (max-width: 900px), (max-aspect-ratio: 1.1/1) {
            #arena {
                flex-direction: column; justify-content: space-between; gap: 10px;
                padding: max(60px, env(safe-area-inset-top)) 10px max(15px, env(safe-area-inset-bottom)) 10px;
            }

            .side-panel { width: 100%; flex-direction: row; padding: 0; align-items: center; justify-content: space-between;}
            .player-info { width: auto; align-items: flex-start; margin-bottom: 0;}
            .player-panel .player-info { align-items: flex-end; }
            body.is-learning .side-panel { display: none; }

            /* Center Stage Flexbox Reordering on Mobile */
            #center-stage { width: 100%; gap: 8px; }
            
            #board-wrapper {
                width: 100%; max-width: min(100vw - 20px, 100dvh - 220px); 
                height: auto; aspect-ratio: 1 / 1; border-width: 6px; margin: 0 auto; 
            }
            body.is-learning #board-wrapper { max-width: min(100vw - 20px, 100dvh - 150px); }

            /* If AI is Black (Top), reasoning is ABOVE board. If White, reasoning is BELOW board */
            body.ai-black #ai-reasoning-box { display: block; order: 1; width: 100%; max-width: min(100vw - 20px, 100dvh - 220px); padding: 8px; font-size: 11px;}
            body.ai-black #board-wrapper { order: 2; }
            body.ai-black #mobile-opening-wrapper { order: 3; width: 100%;}

            body.ai-white #board-wrapper { order: 1; }
            body.ai-white #ai-reasoning-box { display: block; order: 2; width: 100%; max-width: min(100vw - 20px, 100dvh - 220px); padding: 8px; font-size: 11px;}
            body.ai-white #mobile-opening-wrapper { order: 3; width: 100%;}

            /* Clocks and UI Resizing */
            .clock { width: 120px; height: 50px; border-width: 3px; }
            .clock .time { font-size: 26px; }
            .ready-to-start .time { font-size: 22px; }
            .player-label { font-size: 11px; padding: 3px 10px; margin-bottom: 4px; }
            .captured-area { flex: 1; min-height: auto; margin: 0; align-content: center;}
            .opponent-panel .captured-area { justify-content: flex-start; padding-left: 10px;}
            .player-panel .captured-area { justify-content: flex-end; padding-right: 10px;}
            .captured-piece { width: 34px; height: 34px; margin: -5px; }

            #fen-display { top: max(18px, env(safe-area-inset-top)); left: 15px; bottom: auto; font-size: 10px; max-width: calc(100vw - 150px);}
            #top-nav { top: max(12px, env(safe-area-inset-top)); right: 10px; gap: 4px; }
            .glass-btn { padding: 6px 10px; font-size: 10px; }
            #undo-btn { left: 50%; top: -35px; transform: translateX(-50%); padding: 6px 10px; font-size: 10px; }

            /* Mobile Opening Nav routing */
            #opening-nav { position: static; background: transparent; border: none; box-shadow: none; padding: 10px 0 0 0; margin-top: 0; display: none; }
            body.is-learning #mobile-opening-wrapper #opening-nav { display: flex; flex-direction: row; gap: 10px;}
            #opening-nav h3, #opening-nav hr { display: none; }
            .nav-btn-row { width: auto; gap: 5px; }
            #opening-step { font-size: 13px; padding: 10px 5px; width: 45px;}
            #play-from-here-btn { flex: 1; padding: 12px; font-size: 11px; }
        }
    </style>
</head>

<div id="arena">

        <div id="board-wrapper">
            <div id="board"></div>
            <!-- Translucent SVG for overlaying AI hint lines securely above the squares -->
            <svg id="hint-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15;"></svg>
        </div>
        
        <!-- Mobile Injection Wrapper for Theory Explorer -->
        <div id="mobile-opening-wrapper"></div>

    </div>

    <!-- Player Panel -->
    <div class="side-panel player-panel">
        <div id="captured-player" class="captured-area"></div>
        <div class="player-info">
            <!-- Hint Button Flex Wrapper integrated directly beside the label -->
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
                <button id="hint-btn" style="background: none; border: none; font-size: 18px; cursor: pointer; filter: grayscale(100%); transition: all 0.3s; padding: 0; margin: 0; outline: none;" title="Toggle AI Hint">💡</button>
                <span class="player-label" style="margin-bottom: 0;">You</span>
            </div>
            <div style="position: relative;">
                <div id="clock-player" class="clock"><span class="time" id="time-player">10:00</span></div>
                <button id="undo-btn" class="glass-btn">⟲ UNDO (2)</button>
            </div>
        </div>
        
        <!-- Desktop Injection Wrapper for Theory Explorer -->
        <div id="opening-nav">
            <h3>Theory Explorer</h3>
            <div class="nav-btn-row">
                <button id="prev-move-btn" class="glass-btn nav-btn">⬅</button>
                <span id="opening-step">0 / 0</span>
                <button id="next-move-btn" class="glass-btn nav-btn">➡</button>
            </div>
            <hr style="width: 100%; border: 0; border-top: 1px solid rgba(212, 175, 55, 0.2); margin: 8px 0;">
            <button id="play-from-here-btn" class="glass-btn" style="width: 100%; background: #007acc; color: white;">♙ Play From Here</button>
        </div>
    </div>
</div>

<script>
    var board = null;
    var game = new Chess();
    var $status = $('#status-box');
    var $history = $('#move-history');
    
    var isEngineReady = false;
    var isEngineThinking = false;
    var humanColor = 'w'; 
    var stockfishWorker = null;
    var gameEnded = false; 
    var initialStartPending = true; 
    
    var whiteTime = 600;
    var blackTime = 600;
    var timerInterval = null;
    var selectedSquare = null;
    var grandmasterUndos = 2;

    // --- ENDLESS LEARNING MODE VARIABLES ---
    var isLearningMode = false;
    var isGeneratingTheory = false; 
    var currentOpeningKey = null;
    var openingMoves = [];
    var openingCurrentIndex = 0;

    const OPENINGS_DB = {
        "ruy_lopez": ["e4", "e5", "Nf3", "Nc6", "Bb5"],
        "italian": ["e4", "e5", "Nf3", "Nc6", "Bc4"],
        "sicilian": ["e4", "c5"],
        "karpov_caro_kann": ["e4", "c6", "d4", "d5", "Nd2", "dxe4", "Nxe4", "Nd7", "Bc4", "Ngf6", "Ng5", "e6", "Qe2", "Nb6", "Bd3", "h6", "N5f3", "c5", "dxc5", "Bxc5"],
        "kasparov_kings_indian": ["d4", "Nf6", "c4", "g6", "Nc3", "Bg7", "e4", "d6", "Nf3", "O-O", "Be2", "e5", "O-O", "Nc6", "d5", "Ne7", "Ne1", "Nd7", "Nd3", "f5", "Bd2", "Nf6"],
        "fischer_sozin": ["e4", "c5", "Nf3", "d6", "d4", "cxd4", "Nxd4", "Nf6", "Nc3", "a6", "Bc4", "e6", "Bb3", "b5", "O-O", "Be7", "Qf3", "Qc7", "Qg3", "O-O", "Bh6", "Ne8"],
        "tal_modern_benoni": ["d4", "Nf6", "c4", "c5", "d5", "e6", "Nc3", "exd5", "cxd5", "d6", "e4", "g6", "Nf3", "Bg7", "Be2", "O-O", "O-O", "Re8", "Nd2", "Na6", "Re1", "Nc7"],
        "carlsen_catalan": ["d4", "Nf6", "c4", "e6", "g3", "d5", "Bg2", "Be7", "Nf3", "O-O", "O-O", "dxc4", "Qc2", "a6", "Qxc4", "b5", "Qc2", "Bb7", "Bd2", "Nc6"]
    };

    function routeOpeningNav() {
        if ($(window).width() <= 900 || ($(window).width() / $(window).height()) <= 1.1) {
            $('#opening-nav').appendTo('#mobile-opening-wrapper');
        } else {
            $('#opening-nav').appendTo('.player-panel');
        }
    }
    $(window).on('resize orientationchange', routeOpeningNav);
    routeOpeningNav();

    // --- 💡 THE HEURISTIC TRANSLATION ENGINE ---
    function getMoveReasoning(moveObj) {
        if (!moveObj) return "";
        let reason = [];
        let pName = {'p':'Pawn', 'n':'Knight', 'b':'Bishop', 'r':'Rook', 'q':'Queen', 'k':'King'}[moveObj.piece];

        if (moveObj.san === 'O-O') return "Castles kingside to protect the King and connect Rooks.";
        if (moveObj.san === 'O-O-O') return "Castles queenside to protect the King and centralize the Rook.";

        if (moveObj.captured) {
            reason.push(`Captures the piece on ${moveObj.to} to force a structural or material advantage`);
        } else {
            if (moveObj.piece === 'p') {
                if (Math.abs(moveObj.from.charCodeAt(1) - moveObj.to.charCodeAt(1)) === 2) {
                    reason.push("Advances two squares to aggressively claim central territory");
                } else {
                    reason.push(`Pushes the pawn to ${moveObj.to} to control key forward squares`);
                }
            } else if (moveObj.piece === 'n' || moveObj.piece === 'b') {
                reason.push(`Develops the ${pName} to prepare for an attack`);
            } else if (moveObj.piece === 'r' || moveObj.piece === 'q') {
                reason.push(`Activates the major ${pName} to dominate a powerful line`);
            } else {
                reason.push(`Repositions the ${pName} to ${moveObj.to} for better structure`);
            }
        }

        if (moveObj.san.includes('#')) reason.push("delivering a crushing Checkmate!");
        else if (moveObj.san.includes('+')) reason.push("forcing the opponent into Check!");

        if (moveObj.promotion) reason.push(`Promotes the pawn to a Queen for massive power!`);

        return reason.join(" and ") + ".";
    }

    function showReasoning(text) {
        $('#reasoning-text').text(text);
        $('body').removeClass('hide-reasoning');
    }
    function hideReasoning() { $('body').addClass('hide-reasoning'); }


    // --- 🌐 DYNAMIC ONLINE LIBRARY LOGIC ---
    async function fetchOnlineLibrary() {
        try {
            const response = await fetch('https://gist.githubusercontent.com/jasonmerking/0067d706ee2f4459b88a1f4eced99658/raw/chess-library.json');
            const externalData = await response.json();

            const $onlineGroup = $('#online-library');
            $onlineGroup.empty(); 

            externalData.forEach(item => {
                $onlineGroup.append(`<option value="${item.fen}" data-instruction="${item.instruction}">${item.title}</option>`);
            });

        } catch (error) {
            $('#online-library').html('<option value="error" disabled>Network Error</option>');
        }
    }
    fetchOnlineLibrary(); // Execute instantly on boot

    $('#load-custom-fen-btn').on('click', function() {
        var customFen = $('#custom-fen-input').val().trim();
        if (customFen.length > 15 && customFen.includes('/')) { 
            initAudio();
            loadPosition(customFen, "IMPORTED FEN MATCH");
            $('#custom-fen-input').val(''); 
            $('#dashboard-panel').fadeOut(150); 
        } else {
            alert("Invalid FEN. Please paste a valid chess FEN string.");
        }
    });

    // --- AUTOSAVE & RESTORE LOGIC ---
    function saveGameState() {
        if (!isEngineReady) return;
        var state = {
            pgn: game.pgn(), fen: game.fen(), humanColor: humanColor,
            whiteTime: whiteTime, blackTime: blackTime, depth: $('#depth-select').val(),
            timeControl: $('#time-select').val(), useIncrement: $('#increment-toggle').is(':checked'),
            theme: $('#sound-theme-select').val(), undos: grandmasterUndos, title: $('#fen-display').text(),
            gameEnded: gameEnded, initialStartPending: initialStartPending, isLearningMode: isLearningMode,
            openingKey: currentOpeningKey, openingMoves: openingMoves, openingCurrentIndex: openingCurrentIndex,
            reasoningText: $('#reasoning-text').text()
        };
        localStorage.setItem('grandmasterChessSave', JSON.stringify(state));
    }

    function restoreGameState() {
        var saved = localStorage.getItem('grandmasterChessSave');
        if (saved) {
            try {
                var state = JSON.parse(saved);
                $('#depth-select').val(state.depth);
                $('#time-select').val(state.timeControl || "10"); 
                $('#increment-toggle').prop('checked', state.useIncrement !== false);
                $('#sound-theme-select').val(state.theme);
                $('#fen-display').text(state.title);
                if (state.reasoningText && state.reasoningText !== "Waiting for move...") showReasoning(state.reasoningText);
                
                isLearningMode = state.isLearningMode || false;

                if (isLearningMode) {
                    currentOpeningKey = state.openingKey;
                    openingMoves = state.openingMoves || OPENINGS_DB[currentOpeningKey] || [];
                    openingCurrentIndex = state.openingCurrentIndex || 0;
                    if (!game.load_pgn(state.pgn)) game.load(state.fen);
                    
                    humanColor = 'w';
                    board.orientation('white'); board.position(game.fen());
                    
                    $('body').addClass('is-learning').removeClass('ai-white').addClass('ai-black');
                    
                    $status.text("Endless Explorer. Step or let Engine play.").css({"color": "#d4af37", "border-left-color": "#d4af37"});
                    updateLearningUI(); updateHighlights();
                } else {
                    $('body').removeClass('is-learning');
                    if (!game.load_pgn(state.pgn)) game.load(state.fen);
                    
                    humanColor = state.humanColor; whiteTime = state.whiteTime; blackTime = state.blackTime;
                    grandmasterUndos = state.undos; gameEnded = state.gameEnded || false;
                    initialStartPending = state.initialStartPending !== undefined ? state.initialStartPending : false;
                    
                    board.orientation(humanColor === 'w' ? 'white' : 'black');
                    $('body').removeClass('ai-black ai-white').addClass(humanColor === 'w' ? 'ai-black' : 'ai-white');
                    board.position(game.fen());
                    
                    updateOpponentName(); updateUI(); updateHighlights();
                    
                    if (initialStartPending) {
                        $('#time-player').text('START'); $('#clock-player').addClass('ready-to-start');
                        $('#time-opponent').text(formatTime(getStartingSeconds()));
                    } else if (!game.game_over() && !gameEnded) {
                        startTimer();
                        if (game.turn() !== humanColor && !isEngineThinking) triggerEngineMove();
                    }
                }
                return true;
            } catch(e) { return false; }
        }
        return false;
    }

    // --- TIME CONTROL DYNAMICS ---
    function getStartingSeconds() {
        var control = parseInt($('#time-select').val());
        if (control === 1) return 60;    
        if (control === 5) return 300;   
        if (control === 10) return 600;  
        if (control === 20) return 1200; 
        return 600; 
    }
    function getIncrementSeconds() {
        if (!$('#increment-toggle').is(':checked')) return 0;
        var control = parseInt($('#time-select').val());
        if (control === 1) return 1;
        if (control === 5) return 3;
        if (control === 10) return 5;
        if (control === 20) return 10;
        return 0;
    }
    function applyIncrement(color) {
        if (isLearningMode) return;
        var inc = getIncrementSeconds();
        if (inc > 0) {
            if (color === 'w') whiteTime += inc; else blackTime += inc;
            updateClocks();
        }
    }

    // --- DYNAMIC DASHBOARD ---
    function updateOpponentName() {
        if (isLearningMode) return;
        var diffText = $("#depth-select option:selected").text().split(" ")[0];
        $("#opponent-label-name").text(diffText);
        updateUndoButton();
    }
    $('#depth-select, #time-select, #increment-toggle, #sound-theme-select').on('change', function() {
        updateOpponentName(); saveGameState();
    });

    function updateUndoButton() {
        if (isLearningMode) { $('#undo-btn').fadeOut(200); return; }
        var depth = parseInt($('#depth-select').val());
        if (depth === 15 && grandmasterUndos > 0 && game.history().length >= 2 && !isEngineThinking && !gameEnded && !initialStartPending) {
            $('#undo-btn').text('⟲ UNDO (' + grandmasterUndos + ')').fadeIn(200);
        } else {
            $('#undo-btn').fadeOut(200);
        }
    }

    $('#toggle-dashboard-btn').on('click', function() { $('#dashboard-panel').fadeToggle(150); });
    $(document).on('click', function(e) {
        var $panel = $('#dashboard-panel'); var $btn = $('#toggle-dashboard-btn');
        if (!$panel.is(e.target) && $panel.has(e.target).length === 0 && !$btn.is(e.target)) { $panel.fadeOut(150); }
    });

    // --- LOCAL ENGINE & ENDLESS THEORY GENERATOR ---
    fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js', { cache: 'force-cache' })
        .then(response => response.text())
        .then(code => {
            var blob = new Blob([code], {type: 'application/javascript'});
            stockfishWorker = new Worker(URL.createObjectURL(blob));
            stockfishWorker.onmessage = function(event) {
                var line = event.data;
                if (line === 'uciok') { stockfishWorker.postMessage('isready'); } 
                else if (line === 'readyok') {
                    isEngineReady = true; disableControls(false);
                    if (!restoreGameState()) {
                        $('#new-btn').click(); 
                    } else {
                        if (!isLearningMode && initialStartPending) {
                            $status.text("Setup complete. Tap your clock to start.").css({"color": "#d4af37", "border-left-color": "#d4af37"});
                        }
                    }
                } 
                else if (line.startsWith('bestmove')) {
                    var match = line.match(/^bestmove\s([a-h][1-8])([a-h][1-8])([qrbn])?/);
                    if (match) {
                        var move = { from: match[1], to: match[2], promotion: match[3] || 'q' };
                        var engineMove = game.move(move);
                        
                        if (isLearningMode && isGeneratingTheory) {
                            openingMoves.push(engineMove.san);
                            openingCurrentIndex++; board.position(game.fen());
                            playChessSound(engineMove); updateHighlights();
                            
                            showReasoning(getMoveReasoning(engineMove)); // Show theory logic
                            
                            isGeneratingTheory = false;
                            $('#next-move-btn').text('➡').prop('disabled', false);
                            $status.text("Engine Theory Extension generated.").css("color", "#d4af37");
                            
                            updateLearningUI(); saveGameState(); return;
                        }

                        if (!isLearningMode) {
                            board.position(game.fen());
                            playChessSound(engineMove);
                            applyIncrement(engineMove.color);
                            showReasoning(getMoveReasoning(engineMove)); // Show opponent logic
                            
                            isEngineThinking = false; disableControls(false);
                            updateUI(); updateHighlights(); saveGameState();
                        }
                    }
                }
            };
            stockfishWorker.postMessage('uci'); 
        })
        .catch(err => { $status.html("<span style='color:#ff5252'>Engine offline link anomaly.</span>"); });

    window.audioCtx = null;
    function initAudio() {
        if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (window.audioCtx.state === 'suspended') window.audioCtx.resume();
    }
    function playSynthSound(type) {
        try {
            initAudio(); const now = window.audioCtx.currentTime; const profile = $('#sound-theme-select').val();
            const osc = window.audioCtx.createOscillator(); const gain = window.audioCtx.createGain();
            osc.connect(gain); gain.connect(window.audioCtx.destination);
            
            if (type === 'move') { osc.type = 'triangle'; osc.frequency.setValueAtTime(110, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.06); gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.06); osc.start(now); osc.stop(now + 0.06); } 
            else if (type === 'capture') { osc.type = 'sine'; osc.frequency.setValueAtTime(180, now); osc.frequency.setValueAtTime(90, now + 0.03); gain.gain.setValueAtTime(0.8, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.07); osc.start(now); osc.stop(now + 0.07); } 
            else if (type === 'check') { osc.type = 'triangle'; osc.frequency.setValueAtTime(220, now); osc.frequency.setValueAtTime(180, now + 0.1); gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2); osc.start(now); osc.stop(now + 0.2); }
        } catch(e) {}
    }
    function playChessSound(moveObj) {
        if (game.game_over()) return; 
        if (game.in_check()) playSynthSound('check');
        else if (moveObj && moveObj.captured) playSynthSound('capture');
        else playSynthSound('move');
    }

    // --- TIMERS ENGINE ---
    function formatTime(seconds) {
        var m = Math.floor(seconds / 60); var s = seconds % 60;
        return m + ':' + (s < 10 ? '0' : '') + s;
    }
    function updateClocks() {
        if (isLearningMode || initialStartPending) return; 
        var topTime = (humanColor === 'w') ? blackTime : whiteTime; 
        var bottomTime = (humanColor === 'w') ? whiteTime : blackTime;
        $('#time-opponent').text(formatTime(topTime)); $('#time-player').text(formatTime(bottomTime));

        if (!game.game_over() && !gameEnded) {
            if (game.turn() === humanColor) { $('#clock-player').addClass('clock-active'); $('#clock-opponent').removeClass('clock-active'); } 
            else { $('#clock-opponent').addClass('clock-active'); $('#clock-player').removeClass('clock-active'); }
        } else {
            $('#clock-player, #clock-opponent').removeClass('clock-active');
        }
    }
    function startTimer() {
        clearInterval(timerInterval); if (isLearningMode) return; updateClocks();
        timerInterval = setInterval(function() {
            if (game.game_over() || gameEnded || initialStartPending || isLearningMode) return;
            if (game.turn() === 'w') { whiteTime--; if (whiteTime <= 0) handleTimeout('White'); } 
            else { blackTime--; if (blackTime <= 0) handleTimeout('Black'); }
            updateClocks(); saveGameState(); 
        }, 1000);
    }
    function handleTimeout(color) { clearInterval(timerInterval); updateUI(); saveGameState(); }

    function updateCapturedPieces() {
        if (isLearningMode) { $('#captured-player, #captured-opponent').empty(); return; }
        var counts = { w: { p: 8, n: 2, b: 2, r: 2, q: 1 }, b: { p: 8, n: 2, b: 2, r: 2, q: 1 } };
        var boardState = game.board();
        for (var i = 0; i < 8; i++) { for (var j = 0; j < 8; j++) { if (boardState[i][j]) counts[boardState[i][j].color][boardState[i][j].type]--; } }

        function getPieceHTML(color, type, amount, startSeed) {
            var html = ''; var c = color === 'w' ? 'w' : 'b'; var p = type.toUpperCase();
            var src = config.pieceTheme(c + p); var styleClass = c === 'w' ? 'white-piece' : 'black-piece';
            for(var k=0; k < Math.max(0, amount); k++) {
                html += `<img class="captured-piece ${styleClass}" src="${src}" style="transform: rotate(${Math.floor((Math.sin(startSeed + k) * 10000 - Math.floor(Math.sin(startSeed + k) * 10000)) * 90) - 45}deg);">`;
            } return html;
        }

        var humanCaptured = ''; var oppCaptured = ''; var oppColor = humanColor === 'w' ? 'b' : 'w';
        var pieceOrder = ['q','r','b','n','p']; var seedTracker = 1;
        pieceOrder.forEach(function(p) {
            if (counts[oppColor][p] > 0) humanCaptured += getPieceHTML(oppColor, p, counts[oppColor][p], seedTracker++);
            if (counts[humanColor][p] > 0) oppCaptured += getPieceHTML(humanColor, p, counts[humanColor][p], seedTracker++);
        });
        $('#captured-player').html(humanCaptured); $('#captured-opponent').html(oppCaptured);
    }

    function updateHighlights() {
        $('#board .square-55d63').removeClass('selected-square').removeClass('legal-move-hint').removeClass('last-move-square').removeClass('in-check-square');
        if (selectedSquare && !isLearningMode) {
            $('#board .square-' + selectedSquare).addClass('selected-square');
            var moves = game.moves({ square: selectedSquare, verbose: true });
            for (var i = 0; i < moves.length; i++) { $('#board .square-' + moves[i].to).addClass('legal-move-hint'); }
        }
        var history = game.history({ verbose: true });
        if (history.length > 0) {
            var lastMove = history[history.length - 1];
            $('#board .square-' + lastMove.from).addClass('last-move-square');
            $('#board .square-' + lastMove.to).addClass('last-move-square');
        }
        if (game.in_check() || game.in_checkmate()) {
            var turn = game.turn(); var boardState = game.board();
            for (var r = 0; r < 8; r++) {
                for (var c = 0; c < 8; c++) {
                    if (boardState[r][c] && boardState[r][c].type === 'k' && boardState[r][c].color === turn) {
                        $('#board .square-' + ("abcdefgh"[c] + (8 - r))).addClass('in-check-square'); break;
                    }
                }
            }
        }
    }

    // --- ENDLESS LEARNING MODE NAVIGATION & SIMULATION ---
    function nextOpeningMove() {
        if (!isLearningMode || isGeneratingTheory) return; initAudio();

        if (openingCurrentIndex < openingMoves.length) {
            var mInfo = game.move(openingMoves[openingCurrentIndex]);
            if (mInfo) {
                openingCurrentIndex++; board.position(game.fen());
                playChessSound(mInfo); updateHighlights(); updateLearningUI();
                showReasoning(getMoveReasoning(mInfo));
                saveGameState();
            }
        } else {
            if (game.game_over()) return; 
            isGeneratingTheory = true;
            $('#next-move-btn').text('...').prop('disabled', true);
            $status.text("Engine is generating optimal theory line...").css({"color": "#ffcc00", "border-left-color": "#ffcc00"});
            
            // Uses dashboard depth for calculation speed
            var depth = parseInt($('#depth-select').val()); 
            stockfishWorker.postMessage('position fen ' + game.fen());
            stockfishWorker.postMessage('go depth ' + depth);
        }
    }

    function prevOpeningMove() {
        if (!isLearningMode || openingCurrentIndex <= 0 || isGeneratingTheory) return;
        initAudio(); game.undo(); openingCurrentIndex--; board.position(game.fen());
        playSynthSound('move'); updateHighlights(); updateLearningUI(); hideReasoning(); saveGameState();
    }

    function updateLearningUI() {
        $('#opening-step').text(openingCurrentIndex + " / " + openingMoves.length);
        renderHistoryWithHeuristics();
    }

    $('#next-move-btn').on('click', nextOpeningMove);
    $('#prev-move-btn').on('click', prevOpeningMove);

    $(document).on('keydown', function(e) {
        if (isLearningMode) { if (e.key === "ArrowRight") nextOpeningMove(); if (e.key === "ArrowLeft") prevOpeningMove(); }
    });

    $('#play-from-here-btn').on('click', function() {
        if (!isLearningMode || isGeneratingTheory) return; initAudio();
        
        isLearningMode = false; $('body').removeClass('is-learning'); hideReasoning();
        
        humanColor = game.turn(); 
        board.orientation(humanColor === 'w' ? 'white' : 'black');
        $('body').removeClass('ai-black ai-white').addClass(humanColor === 'w' ? 'ai-black' : 'ai-white');
        
        var clockTime = getStartingSeconds(); whiteTime = clockTime; blackTime = clockTime;
        grandmasterUndos = 2; initialStartPending = true;

        updateOpponentName(); updateCapturedPieces(); updateHighlights();
        
        $status.text("Setup complete. Tap your clock to start.").css({"color": "#d4af37", "border-left-color": "#d4af37"});
        $('#time-player').text('START'); $('#clock-player').addClass('ready-to-start');
        $('#time-opponent').text(formatTime(clockTime));
        $('#clock-player, #clock-opponent').removeClass('clock-active');
        saveGameState();
    });

    // --- GAMEPLAY INTERACTION ---
    $('#clock-player').on('click', function() {
        if (isLearningMode) return;
        if (initialStartPending && isEngineReady) {
            initAudio(); initialStartPending = false; $(this).removeClass('ready-to-start');
            updateClocks(); startTimer(); updateUI();
            if (game.turn() !== humanColor) triggerEngineMove();
            saveGameState();
        }
    });

    $('#board').on('click', '.square-55d63', function() {
        initAudio();
        if (isLearningMode || initialStartPending) return; 
        if (game.game_over() || isEngineThinking || whiteTime <= 0 || blackTime <= 0) return;
        if (game.turn() !== humanColor) return;
        
        var square = $(this).attr('data-square');
        if (selectedSquare) {
            var moves = game.moves({ square: selectedSquare, verbose: true });
            var isLegalMove = moves.some(m => m.to === square);
            
            if (isLegalMove) {
                var move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                selectedSquare = null; board.position(game.fen());
                playChessSound(move); applyIncrement(move.color);
                
                showReasoning(getMoveReasoning(move)); // Show your own heuristic reason
                
                updateUI(); updateHighlights(); saveGameState(); triggerEngineMove();
                return;
            }
            var piece = game.get(square);
            if (piece && piece.color === humanColor) { selectedSquare = square; updateHighlights(); return; }
            selectedSquare = null; updateHighlights();
        } else {
            var piece = game.get(square);
            if (piece && piece.color === humanColor) { selectedSquare = square; updateHighlights(); }
        }
    });

    $('#undo-btn').on('click', function() {
        if (grandmasterUndos > 0 && game.history().length >= 2 && !isEngineThinking && !initialStartPending && !isLearningMode) {
            initAudio(); grandmasterUndos--; game.undo(); game.undo(); 
            board.position(game.fen()); selectedSquare = null; hideReasoning();
            playSynthSound('move'); updateUI(); updateHighlights(); saveGameState();
        }
    });

    function triggerEngineMove() {
        if (game.game_over() || whiteTime <= 0 || blackTime <= 0 || isLearningMode) return;
        isEngineThinking = true; disableControls(true); updateUndoButton(); 
        $status.text("Stockfish is calculating...");
        
        var depth = parseInt($('#depth-select').val());
        stockfishWorker.postMessage('position fen ' + game.fen());
        stockfishWorker.postMessage('go depth ' + depth);
    }

    // Renders the notation box with deep heuristic strings
    function renderHistoryWithHeuristics() {
        var history = game.history({verbose: true});
        var historyHTML = "";
        for (var i = 0; i < history.length; i += 2) {
            var moveNum = (i / 2) + 1; 
            var wMove = history[i]; var bMove = history[i+1];
            
            var wText = wMove.san + " <span class='reasoning-text'>(" + getMoveReasoning(wMove) + ")</span>";
            var bText = "";
            if (bMove) { bText = bMove.san + " <span class='reasoning-text'>(" + getMoveReasoning(bMove) + ")</span>"; }
            
            historyHTML += `<div class='history-turn'><strong>${moveNum}.</strong> ${wText}`;
            if(bMove) historyHTML += `<div style="padding-left:15px; margin-top:4px;"><strong>...</strong> ${bText}</div>`;
            historyHTML += `</div>`;
        }
        if (history.length === 0) historyHTML = "<em>Match initialized...</em>";
        $history.html(historyHTML);
        var historyDiv = document.getElementById('move-history'); historyDiv.scrollTop = historyDiv.scrollHeight;
    }

    function updateUI () {
        if (initialStartPending || isLearningMode) return; 
        updateCapturedPieces(); updateClocks(); updateUndoButton(); updateHighlights();
        
        if (game.game_over() || whiteTime <= 0 || blackTime <= 0) {
            clearInterval(timerInterval);
            if (!gameEnded) {
                gameEnded = true; var humanWon = false; var draw = false;
                
                if (whiteTime <= 0) humanWon = (humanColor === 'b');
                else if (blackTime <= 0) humanWon = (humanColor === 'w');
                else if (game.in_checkmate()) humanWon = (game.turn() !== humanColor);
                else draw = true;

                if (draw) { playSynthSound('lose'); $status.text('Game Ended in a Draw.').css('border-left-color', '#888'); } 
                else if (humanWon) { playSynthSound('win'); confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#d4af37', '#ff0000', '#00ff00', '#0000ff'] }); $status.text('Brilliant! You Won!').css('border-left-color', '#00ff00'); } 
                else { playSynthSound('lose'); $status.text('You were defeated.').css('border-left-color', '#ff0000'); }
            }
        } else {
            var oppName = $("#opponent-label-name").text();
            var whoseTurn = (game.turn() === humanColor) ? "Your turn" : oppName + "'s turn";
            $status.text(whoseTurn).css('border-left-color', '#007acc');
            if (game.in_check()) $status.text(whoseTurn + ' (IN CHECK!)');
        }

        renderHistoryWithHeuristics();
    }

    function disableControls(disabled) {
        if (!isEngineReady) return; 
        $('#new-btn, #load-btn, #random-btn, #switch-btn, #scenario-select, #depth-select, #time-select, #increment-toggle').prop('disabled', disabled);
    }

    function loadPosition(fenOrOpening, matchTitle) {
        if (isEngineThinking) return;
        selectedSquare = null; gameEnded = false; clearInterval(timerInterval);
        
        var hasCustomInstruction = false;
        var customInstructionText = "";

        // Check if there's a custom instruction attached to this option in the HTML
        var $opt = $('#scenario-select option[value="'+fenOrOpening+'"]');
        if ($opt.length && $opt.data('instruction')) {
            hasCustomInstruction = true;
            customInstructionText = $opt.data('instruction');
        }

        if (fenOrOpening.startsWith("OPENING:")) {
            isLearningMode = true; initialStartPending = false;
            currentOpeningKey = fenOrOpening.split(":")[1];
            openingMoves = OPENINGS_DB[currentOpeningKey] || [];
            openingCurrentIndex = 0;
            
            game.reset(); humanColor = 'w'; 
            board.orientation('white'); board.position(game.fen());
            $('body').removeClass('ai-white').addClass('ai-black').addClass('is-learning');
            
            $('#fen-display').text("LEARNING: " + matchTitle);
            $status.text("Endless Explorer. Step or let Engine play.").css({"color": "#d4af37", "border-left-color": "#d4af37"});
            
            if (hasCustomInstruction) showReasoning(customInstructionText); else hideReasoning();
            
            updateLearningUI(); updateHighlights(); updateCapturedPieces(); saveGameState();
        } else {
            isLearningMode = false; currentOpeningKey = null;
            $('body').removeClass('is-learning');
            initialStartPending = true; $('#clock-player').removeClass('ready-to-start');
            
            game.load(fenOrOpening);
            humanColor = game.turn(); 
            board.orientation(humanColor === 'w' ? 'white' : 'black');
            $('body').removeClass('ai-black ai-white').addClass(humanColor === 'w' ? 'ai-black' : 'ai-white');
            board.position(game.fen());
            
            var clockTime = getStartingSeconds(); whiteTime = clockTime; blackTime = clockTime;
            grandmasterUndos = 2; 
            
            $('#fen-display').text(matchTitle || "SCENARIO: STANDARD MATCH");
            
            if (hasCustomInstruction) showReasoning(customInstructionText); else hideReasoning();

            updateOpponentName(); updateHighlights(); updateCapturedPieces();
            
            $status.text("Setup complete. Tap your clock to start.").css({"color": "#d4af37", "border-left-color": "#d4af37"});
            $('#time-player').text('START'); $('#clock-player').addClass('ready-to-start');
            $('#time-opponent').text(formatTime(clockTime));
            $('#clock-player, #clock-opponent').removeClass('clock-active');
            saveGameState();
        }
        
        // Hide hints smoothly on load
        if(isHintActive) { $('#hint-btn').click(); }
    }

    // EVENT HANDLERS
    $('#new-btn').on('click', function() { initAudio(); loadPosition('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1', "SCENARIO: STANDARD MATCH"); });
    $('#load-btn').on('click', function() { initAudio(); var title = $('#scenario-select option:selected').text(); loadPosition($('#scenario-select').val(), title); $('#dashboard-panel').fadeOut(150); });
    $('#random-btn').on('click', function() {
        initAudio(); var options = $('#scenario-select option'); var randomIdx = Math.floor(Math.random() * options.length);
        $('#scenario-select').prop('selectedIndex', randomIdx); var title = options.eq(randomIdx).text();
        loadPosition(options.eq(randomIdx).val(), title);
    });

    $('#switch-btn').on('click', function() {
        initAudio(); if (isEngineThinking || game.game_over() || isLearningMode) return;
        selectedSquare = null; humanColor = (humanColor === 'w') ? 'b' : 'w'; 
        board.orientation(humanColor === 'w' ? 'white' : 'black'); 
        $('body').removeClass('ai-black ai-white').addClass(humanColor === 'w' ? 'ai-black' : 'ai-white');
        if (initialStartPending) { updateCapturedPieces(); $('#time-player').text('START'); hideReasoning(); } else { triggerEngineMove(); }
        saveGameState();
    });

    var config = { pieceTheme: function(piece) { return 'https://images.chesscomfiles.com/chess-themes/pieces/wood/150/' + piece.toLowerCase() + '.png'; }, draggable: false, position: 'empty' };
    board = Chessboard('board', config);
    
    var resizeDebounce;
    $(window).on('resize orientationchange', function() {
        clearTimeout(resizeDebounce);
        resizeDebounce = setTimeout(function() { if(board) board.resize(); updateHighlights(); }, 150);
    });
    setTimeout(function() { board.resize(); updateHighlights(); }, 150);
    updateOpponentName();

    // =========================================================================
    // --- AI HINT FEATURE (SEAMLESS INJECTION) ---
    // =========================================================================
    var isHintActive = false;
    var hintWorker = null;

    // Boot a dedicated, decoupled worker for hints to safely run parallel to the main logic[cite: 1]
    fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js', { cache: 'force-cache' })
        .then(response => response.text())
        .then(code => {
            var blob = new Blob([code], {type: 'application/javascript'});
            hintWorker = new Worker(URL.createObjectURL(blob));
            hintWorker.onmessage = function(event) {
                var line = event.data;
                // Parse AI's recommended move and predicted opponent response (the 'ponder' line)
                if (line.startsWith('bestmove')) {
                    var match = line.match(/^bestmove\s([a-h][1-8])([a-h][1-8])[qrbn]?(?:\sponder\s([a-h][1-8])([a-h][1-8]))?/);
                    if (match && isHintActive && !isEngineThinking) {
                        drawHintLines(match[1], match[2], match[3], match[4]);
                    }
                }
            };
            hintWorker.postMessage('uci');
        });

    $('#hint-btn').on('click', function() {
    isHintActive = !isHintActive;
    if (isHintActive) {
        $(this).css({ 'filter': 'grayscale(0%) drop-shadow(0 0 10px #ffcc00)' });
        requestHint();
    } else {
        // FIX: Reverted to just grayscale to properly remove the glow
        $(this).css({ 'filter': 'grayscale(100%)' });
        clearHintLines();
    }
});

    function requestHint() {
        if (isHintActive && hintWorker && !isLearningMode && !initialStartPending && !game.game_over() && game.turn() === humanColor) {
            hintWorker.postMessage('position fen ' + game.fen());
            hintWorker.postMessage('go depth 12'); 
        }
    }

    function clearHintLines() {
        $('#hint-svg').empty();
    }

    function drawHintLines(f1, t1, f2, t2) {
        clearHintLines();
        
        // Move 1: Draw the primary AI-suggested move[cite: 1]
        drawLine(f1, t1, 'rgba(200, 200, 200, 0.65)', 10);
        
        // Move 2: Draw the anticipated opponent response if multi-step analysis (ponder) caught it
        if (f2 && t2) {
            drawLine(f2, t2, 'rgba(200, 200, 200, 0.4)', 6);
        }
    }

    // Mathematical grid plotting mapping the dynamic squares to precise SVG strokes[cite: 1]
    function drawLine(from, to, color, width) {
        var $board = $('#board');
        var $fromSq = $board.find('.square-' + from);
        var $toSq = $board.find('.square-' + to);
        var $svgBox = $('#hint-svg');
        
        if (!$fromSq.length || !$toSq.length) return;
        
        var svgPos = $svgBox.offset();
        var fromPos = $fromSq.offset();
        var toPos = $toSq.offset();
        
        var sqWidth = $fromSq.outerWidth();
        var sqHeight = $fromSq.outerHeight();
        
        // Draw identically from the absolute center box coordinates 
        var x1 = fromPos.left - svgPos.left + (sqWidth / 2);
        var y1 = fromPos.top - svgPos.top + (sqHeight / 2);
        var x2 = toPos.left - svgPos.left + (sqWidth / 2);
        var y2 = toPos.top - svgPos.top + (sqHeight / 2);
        
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', color);
        line.setAttribute('stroke-width', width);
        line.setAttribute('stroke-linecap', 'round');
        
        $svgBox.append(line);
    }

    // Safely hook into the original loop to trigger hint generation smoothly after opponent plays[cite: 1]
    var _originalUpdateUI = updateUI;
    updateUI = function() {
        _originalUpdateUI();
        clearHintLines();
        if (game.turn() === humanColor) {
            requestHint();
        }
    };

    // Erase hints visually the exact moment the user interacts with the board
    $('#board').on('mousedown touchstart', function() {
        clearHintLines();
    });

    var _resizeDebounceHint;
    $(window).on('resize orientationchange', function() {
        clearTimeout(_resizeDebounceHint);
        _resizeDebounceHint = setTimeout(function() { 
            if (isHintActive && game.turn() === humanColor) requestHint();
        }, 200);
    });
</script>
</body>
